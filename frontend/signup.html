<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StatioPoint — Sign Up</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{min-height:100vh;background:#0A0C10;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;color:#F0F2F8;}
body::before{content:'';position:fixed;top:-100px;left:50%;transform:translateX(-50%);width:700px;height:500px;background:radial-gradient(ellipse,rgba(245,200,66,0.07),transparent 65%);pointer-events:none;}

.card{width:420px;background:#111318;border:1px solid #252A35;border-radius:20px;padding:40px;box-shadow:0 40px 80px rgba(0,0,0,0.6);margin: 20px 0;}

/* logo */
.logo-row{display:flex;align-items:center;gap:12px;margin-bottom:24px;}
.logo-box{width:42px;height:42px;background:#F5C842;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;letter-spacing:-0.5px;}
.logo-text span{color:#F5C842;}

h2{font-family:'Syne',sans-serif;font-weight:700;font-size:22px;margin-bottom:6px;}
.sub{font-size:12px;color:#A0A8B8;margin-bottom:26px;line-height:1.7;}

/* role chips */
.role-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#A0A8B8;margin-bottom:8px;}
.role-row{display:flex;gap:10px;margin-bottom:22px;}
.role-chip{flex:1;padding:9px;border-radius:8px;border:1px solid #252A35;background:none;color:#A0A8B8;font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;transition:all .15s;text-align:center;}
.role-chip.active{background:rgba(245,200,66,0.1);border-color:#F5C842;color:#F5C842;}

/* form */
.field{margin-bottom:14px;}
.field label{display:block;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#A0A8B8;margin-bottom:6px;}
.field-wrap{position:relative;}
.field-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:14px;color:#A0A8B8;}
input{width:100%;background:#181C24;border:1px solid #252A35;border-radius:8px;padding:11px 14px 11px 38px;font-family:'DM Mono',monospace;font-size:13px;color:#F0F2F8;outline:none;transition:border-color .15s;}
input:focus{border-color:#F5C842;}
input::placeholder{color:#A0A8B8;}

.divider{height:1px;background:#252A35;margin:18px 0;}
.btn-login{width:100%;height:46px;background:#F5C842;border:none;border-radius:8px;font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:#0A0C10;cursor:pointer;transition:background .15s;letter-spacing:.5px;}
.btn-login:hover{background:#ffd000;}
.btn-login:disabled{opacity:.6;cursor:not-allowed;}
.footer{margin-top:20px;text-align:center;font-size:11px;color:#A0A8B8;}

/* error / success */
.error-msg{background:rgba(255,77,109,0.1);border:1px solid rgba(255,77,109,0.3);color:#FF4D6D;border-radius:8px;padding:10px 14px;font-size:12px;margin-bottom:14px;display:none;}
.success-msg{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);color:#22C55E;border-radius:8px;padding:10px 14px;font-size:12px;margin-bottom:14px;display:none;}
.link{color: #F5C842; text-decoration: none;}
.link:hover{text-decoration: underline;}
</style>
</head>
<body>
<div class="card">
  <!-- Logo -->
  <div class="logo-row">
    <div class="logo-box">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <rect x="3" y="5" width="10" height="2" rx="1" fill="#0A0C10"/>
        <rect x="3" y="9" width="15" height="2" rx="1" fill="#0A0C10"/>
        <rect x="3" y="13" width="7" height="2" rx="1" fill="#0A0C10"/>
        <circle cx="17" cy="17" r="4" fill="#0A0C10"/>
        <rect x="16.2" y="14.5" width="1.6" height="3" rx=".8" fill="#F5C842"/>
        <rect x="15" y="16.2" width="4" height="1.6" rx=".8" fill="#F5C842"/>
      </svg>
    </div>
    <div class="logo-text">Statio<span>Point</span></div>
  </div>

  <h2>Create Account ✨</h2>
  <p class="sub">Sign up to join the StatioPoint POS system.</p>

  <!-- Role selector -->
  <div class="role-label">Register as</div>
  <div class="role-row">
    <button class="role-chip active" id="chip-cashier" onclick="selectRole('cashier')">🧾 Cashier</button>
    <button class="role-chip"        id="chip-admin"   onclick="selectRole('admin')">🛡️ Admin</button>
  </div>

  <div class="error-msg" id="error-msg"></div>
  <div class="success-msg" id="success-msg"></div>

  <!-- Form -->
  <div class="field">
    <label>Full Name</label>
    <div class="field-wrap">
      <span class="field-icon">📝</span>
      <input id="fullname" type="text" placeholder="e.g. Ali Khan"/>
    </div>
  </div>

  <div class="field">
    <label>Email</label>
    <div class="field-wrap">
      <span class="field-icon">✉️</span>
      <input id="email" type="email" placeholder="e.g. ali@shop.pk"/>
    </div>
  </div>

  <div class="field">
    <label>Username</label>
    <div class="field-wrap">
      <span class="field-icon">👤</span>
      <input id="username" type="text" placeholder="Choose a username"/>
    </div>
  </div>

  <div class="field">
    <label>Password</label>
    <div class="field-wrap">
      <span class="field-icon">🔒</span>
      <input id="password" type="password" placeholder="••••••••"/>
    </div>
  </div>

  <div class="divider"></div>
  <button class="btn-login" id="signup-btn" onclick="handleSignup()">Sign Up →</button>
  <div class="footer">
    Already have an account? <a href="/" class="link">Log in here</a>
  </div>
</div>

<script>
const API = '/api';
let selectedRole = 'cashier';

function selectRole(role) {
  selectedRole = role;
  document.getElementById('chip-cashier').classList.toggle('active', role === 'cashier');
  document.getElementById('chip-admin').classList.toggle('active',   role === 'admin');
}

function showMsg(msg, isError) {
  const errEl = document.getElementById('error-msg');
  const sucEl = document.getElementById('success-msg');
  errEl.style.display = 'none';
  sucEl.style.display = 'none';
  if (isError) {
    errEl.textContent = msg; errEl.style.display = 'block';
  } else {
    sucEl.innerHTML = msg; sucEl.style.display = 'block';
  }
}

async function handleSignup() {
  const fullName = document.getElementById('fullname').value.trim();
  const email    = document.getElementById('email').value.trim();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();

  if (!fullName || !email || !username || !password) {
    return showMsg('Please fill in all fields.', true);
  }

  const btn = document.getElementById('signup-btn');
  btn.textContent = 'Creating account...';
  btn.disabled = true;

  try {
    const res = await fetch(`${API}/auth/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fullName, email, username, password, role: selectedRole })
    });
    const data = await res.json();

    if (data.success) {
      showMsg(data.message + ' <a href="/" class="link">Click to login!</a>', false);
      // clear fields
      document.getElementById('fullname').value = '';
      document.getElementById('email').value = '';
      document.getElementById('username').value = '';
      document.getElementById('password').value = '';
    } else {
      showMsg(data.message || 'Registration failed.', true);
    }
  } catch (err) {
    showMsg('Cannot connect to server. Please ensure backend is running.', true);
  } finally {
    btn.textContent = 'Sign Up →';
    btn.disabled = false;
  }
}

// Allow Enter key
document.addEventListener('keydown', e => { if (e.key === 'Enter') handleSignup(); });
</script>
</body>
</html>
